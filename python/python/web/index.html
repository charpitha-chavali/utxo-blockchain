<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UTXO Blockchain — Browser Demo</title>
<style>
  :root{
    --bg:#0f1115; --panel:#161a21; --panel2:#1d222b; --border:#2a3038;
    --text:#e8e6e1; --muted:#8b93a1; --accent:#4ecdc4; --gold:#d4a24c; --red:#e25c5c;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text); font-family:var(--sans);
    min-height:100vh;
  }
  header{
    padding:20px 24px; border-bottom:1px solid var(--border);
    display:flex; align-items:baseline; gap:12px;
  }
  header h1{font-size:18px; font-weight:600; margin:0; letter-spacing:0.3px;}
  header span{color:var(--muted); font-size:13px; font-family:var(--mono);}
  .wrap{max-width:980px; margin:0 auto; padding:0 24px 40px;}
  nav{display:flex; gap:4px; margin:20px 0 16px; border-bottom:1px solid var(--border);}
  nav button{
    background:none; border:none; color:var(--muted); padding:10px 16px;
    font-size:13px; cursor:pointer; border-bottom:2px solid transparent;
    font-family:var(--sans); font-weight:500;
  }
  nav button.active{color:var(--accent); border-bottom-color:var(--accent);}
  .tab{display:none;}
  .tab.active{display:block;}
  .panel{
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:18px 20px; margin-bottom:16px;
  }
  .panel h2{font-size:13px; text-transform:uppercase; letter-spacing:0.6px; color:var(--muted); margin:0 0 14px;}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  label{font-size:12px; color:var(--muted); display:block; margin-bottom:4px;}
  input, select{
    background:var(--panel2); border:1px solid var(--border); color:var(--text);
    padding:8px 10px; border-radius:6px; font-size:13px; font-family:var(--mono);
  }
  input::placeholder{color:#5a6170;}
  button.btn{
    background:var(--accent); color:#06201d; border:none; padding:9px 16px;
    border-radius:6px; font-size:13px; font-weight:600; cursor:pointer;
  }
  button.btn:hover{opacity:0.88;}
  button.btn.secondary{background:var(--panel2); color:var(--text); border:1px solid var(--border);}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; color:var(--muted); font-weight:500; padding:6px 8px; border-bottom:1px solid var(--border); font-size:11px; text-transform:uppercase;}
  td{padding:8px; border-bottom:1px solid var(--border); font-family:var(--mono); font-size:12.5px;}
  .addr{color:var(--accent); word-break:break-all;}
  .bal{color:var(--gold); font-weight:600;}
  .muted{color:var(--muted);}
  .log{
    background:#0b0d11; border:1px solid var(--border); border-radius:8px; padding:12px;
    font-family:var(--mono); font-size:12px; max-height:200px; overflow-y:auto; line-height:1.6;
  }
  .log .ok{color:var(--accent);}
  .log .err{color:var(--red);}
  .log .info{color:var(--muted);}
  .block-card{
    border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:10px;
    background:var(--panel2);
  }
  .block-card .hash{font-family:var(--mono); font-size:12px; color:var(--gold); word-break:break-all;}
  .field-grid{display:grid; grid-template-columns:1fr; gap:10px; max-width:480px;}
  .badge{display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600;}
  .badge.coinbase{background:rgba(212,162,76,0.15); color:var(--gold);}
  .badge.transfer{background:rgba(78,205,196,0.15); color:var(--accent);}
</style>
</head>
<body>

<header>
  <h1>UTXO Blockchain</h1>
  <span id="chain-status">genesis block only</span>
</header>

<div class="wrap">

  <nav>
    <button class="tabbtn active" data-tab="wallets">Wallets / Balance</button>
    <button class="tabbtn" data-tab="send">Send</button>
    <button class="tabbtn" data-tab="mine">Mine</button>
    <button class="tabbtn" data-tab="explorer">Chain Explorer</button>
  </nav>

  <div id="tab-wallets" class="tab active">
    <div class="panel">
      <h2>Create wallet</h2>
      <div class="row">
        <input id="new-wallet-name" placeholder="wallet name e.g. alice">
        <button class="btn" id="btn-create-wallet">Create wallet</button>
      </div>
    </div>
    <div class="panel">
      <h2>Wallets</h2>
      <table id="wallet-table">
        <thead><tr><th>Name</th><th>Address</th><th>Balance</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="tab-send" class="tab">
    <div class="panel">
      <h2>Send coins</h2>
      <div class="field-grid">
        <div>
          <label>From wallet</label>
          <select id="send-from"></select>
        </div>
        <div>
          <label>To (pick a wallet or paste an address)</label>
          <input id="send-to" list="wallet-names" placeholder="UX...">
          <datalist id="wallet-names"></datalist>
        </div>
        <div>
          <label>Amount</label>
          <input id="send-amount" type="number" step="any" placeholder="10">
        </div>
        <div>
          <label>Fee (optional)</label>
          <input id="send-fee" type="number" step="any" value="0">
        </div>
        <div><button class="btn" id="btn-send">Sign and broadcast</button></div>
      </div>
    </div>
    <div class="panel">
      <h2>Mempool (pending transactions)</h2>
      <div id="mempool-list" class="muted">empty</div>
    </div>
  </div>

  <div id="tab-mine" class="tab">
    <div class="panel">
      <h2>Mine a block</h2>
      <div class="row">
        <select id="miner-select"></select>
        <button class="btn" id="btn-mine">Mine block (reward 50)</button>
        <span id="mine-status" class="muted"></span>
      </div>
    </div>
    <div class="panel">
      <h2>Last mined block</h2>
      <div id="last-block">not mined yet</div>
    </div>
  </div>

  <div id="tab-explorer" class="tab">
    <div class="panel">
      <div class="row" style="justify-content:space-between;">
        <h2 style="margin:0;">Chain</h2>
        <button class="btn secondary" id="btn-validate">Validate chain</button>
      </div>
      <div id="validate-result" class="muted" style="margin:10px 0;"></div>
      <div id="chain-list"></div>
    </div>
  </div>

  <div class="panel">
    <h2>Activity log</h2>
    <div class="log" id="log"></div>
  </div>

</div>

<script>
const MINING_REWARD = 50;
const DIFFICULTY = 4; // leading hex zeros required

function logMsg(msg, cls){
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = cls || 'info';
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function bufToHex(buf){
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function hexToBuf(hex){
  const arr = new Uint8Array(hex.length/2);
  for(let i=0;i<hex.length;i+=2) arr[i/2] = parseInt(hex.substr(i,2),16);
  return arr.buffer;
